name: Build APK Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Salvar lib e pubspec
        run: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml

      - name: Criar estrutura Android
        run: flutter create --platforms=android --project-name gestorfinanceiro .

      - name: Restaurar arquivos do projeto
        run: |
          rm -rf lib
          cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml

      - name: Instalar dependências
        run: flutter pub get

      - name: Configurar keystore
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Usando keystore existente..."
            echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > ~/.android/debug.keystore
          else
            echo "Gerando novo keystore fixo..."
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo ""
            echo "=============================="
            echo "KEYSTORE_BASE64 (salve como Secret):"
            echo "=============================="
            base64 -w 0 ~/.android/debug.keystore
            echo ""
            echo "=============================="
          fi

      - name: Mostrar SHA-1
        run: |
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android -keypass android \
            | grep "SHA1:"

      - name: Configurar google-services no build.gradle
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.7.10'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath 'com.google.gms:google-services:4.4.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
          echo "" >> android/app/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle

      - name: Criar google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES" ]; then
            echo "$GOOGLE_SERVICES" > android/app/google-services.json
            echo "google-services.json criado!"
            head -5 android/app/google-services.json
          else
            echo "Secret não configurado, removendo plugin google-services..."
            sed -i '/com.google.gms.google-services/d' android/app/build.gradle
            sed -i '/com.google.gms:google-services/d' android/build.gradle
          fi

      - name: Analisar código Dart
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK Debug
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          flutter build apk --debug \
            --dart-define=SERVICE_ACCOUNT_JSON="$SERVICE_ACCOUNT_JSON"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor-financeiro-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
