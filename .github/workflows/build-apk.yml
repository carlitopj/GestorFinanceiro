name: Build APK Debug

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter Atualizado
        uses: subosito/flutter-action@v2
        with:
          # CORREÇÃO: Usar a versão estável mais recente limpa os conflitos de SDK do pubspec
          channel: 'stable'

      - name: Garantir e Validar Estrutura de Arquivos
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "ERRO CRÍTICO: pubspec.yaml não foi encontrado na raiz do repositório!"
            exit 1
          fi
          
          mkdir -p ../projeto_backup
          cp -r lib ../projeto_backup/lib
          cp pubspec.yaml ../projeto_backup/pubspec.yaml
          [ -d "test" ] && cp -r test ../projeto_backup/test || echo "Sem pasta test"

      - name: Criar estrutura Android nativa
        run: flutter create --platforms=android --project-name gestor_financeiro .

      - name: Restaurar arquivos originais do projeto
        run: |
          rm -rf lib
          cp -r ../projeto_backup/lib lib
          cp ../projeto_backup/pubspec.yaml pubspec.yaml
          
          rm -rf test
          if [ -d "../projeto_backup/test" ]; then
            cp -r ../projeto_backup/test test
          fi

      - name: Instalar dependências do projeto
        run: flutter pub get

      - name: Injetar permissões de Armazenamento no Android
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS="<uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>\n    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>"
          sed -i "s|<manifest[^>]*>|\0\n    $PERMISSIONS|" $MANIFEST_PATH

      - name: Limpar cache do Gradle
        run: |
          cd android
          ./gradlew clean

      - name: Compilar APK de Depuração
        run: flutter build apk --debug --verbose

      - name: Agrupar artefatos de saída
        run: |
          mkdir -p /tmp/apk_output
          find build/app/outputs/flutter-apk/ -name "app-debug.apk" -exec cp {} /tmp/apk_output/ \;

      - name: Upload APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: gestor-financeiro-apk
          path: /tmp/apk_output/app-debug.apk
          retention-days: 30
          if-no-files-found: error
