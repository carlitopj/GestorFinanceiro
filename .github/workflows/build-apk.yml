name: Build APK Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Salvar lib e pubspec
        run: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml

      - name: Criar estrutura Android
        run: flutter create --platforms=android --project-name gestorfinanceiro .

      - name: Restaurar arquivos do projeto
        run: |
          rm -rf lib
          cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml

      - name: Instalar dependências
        run: flutter pub get

      - name: Build APK Debug
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor-financeiro-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30