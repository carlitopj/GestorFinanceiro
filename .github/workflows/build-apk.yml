name: Build APK Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Instalar dependências
        run: flutter pub get

      # ESTA É A ETAPA NOVA QUE ADICIONAMOS:
      - name: Criar pasta Android oculta
        run: flutter create . --platforms=android --project-name=gestorfinanceiro

      - name: Build APK Debug
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor-financeiro-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          
