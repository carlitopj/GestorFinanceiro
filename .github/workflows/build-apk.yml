name: Build APK Debug

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Salvar lib e pubspec
        run: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml
          # Opcional: Se tiver pasta test, faz backup também
          [ -d "test" ] && cp -r test /tmp/test_backup || echo "Sem pasta test"

      - name: Criar estrutura Android
        # CORRIGIDO: --project-name agora usa o mesmo nome do pubspec.yaml
        run: flutter create --platforms=android --project-name gestor_financeiro .

      - name: Restaurar arquivos do projeto
        run: |
          rm -rf lib
          cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml
          
          # CORRIGIDO: Restaura ou limpa a pasta test de forma segura
          rm -rf test
          if [ -d "/tmp/test_backup" ]; then
            cp -r /tmp/test_backup test
          fi

      - name: Instalar dependências
        run: flutter pub get

      - name: Limpar cache Gradle
        run: |
          cd android
          ./gradlew clean

      - name: Build APK Debug
        # CORRIGIDO: Removido o tail -30 para você conseguir ver os erros se algo falhar
        run: flutter build apk --debug --verbose

      - name: Copiar APK
        run: |
          mkdir -p /tmp/apk_output
          # O Flutter build por padrão joga em build/app/outputs/flutter-apk/
          find build/app/outputs/flutter-apk/ -name "app-debug.apk" 2>/dev/null -exec cp {} /tmp/apk_output/ \;
          ls -la /tmp/apk_output/ || echo "APK nao encontrado"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor-financeiro-apk
          path: /tmp/apk_output/app-debug.apk
          retention-days: 30
          if-no-files-found: error
