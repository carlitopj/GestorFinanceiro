name: Build APK Debug

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Salvar arquivos originais
        run: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml
          [ -d "test" ] && cp -r test /tmp/test_backup || echo "Sem testes"

      - name: Criar estrutura Android nativa para SQLite
        run: flutter create --platforms=android --project-name gestor_financeiro .

      - name: Restaurar arquivos do projeto
        run: |
          rm -rf lib
          cp -r /tmp/lib_backup lib
          cp /tmp/pubspec_backup.yaml pubspec.yaml
          rm -rf test
          if [ -d "/tmp/test_backup" ]; then
            cp -r /tmp/test_backup test
          fi

      - name: Instalar dependências
        run: flutter pub get

      - name: Configurar Permissões Android (Necessário para salvar arquivos)
        run: |
          # Garante que o AndroidManifest tenha permissão de leitura/escrita se necessário
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS="<uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\"/>\n    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"/>"
          sed -i "s|<manifest[^>]*>|\0\n    $PERMISSIONS|" $MANIFEST_PATH

      - name: Limpar e Preparar Gradle
        run: |
          cd android
          ./gradlew clean

      - name: Build APK Debug
        run: flutter build apk --debug --verbose

      - name: Copiar APK
        run: |
          mkdir -p /tmp/apk_output
          find build/app/outputs/flutter-apk/ -name "app-debug.apk" 2>/dev/null -exec cp {} /tmp/apk_output/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor-financeiro-apk
          path: /tmp/apk_output/app-debug.apk
          retention-days: 30
          if-no-files-found: error
