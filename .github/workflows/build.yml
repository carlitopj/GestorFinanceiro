name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential ccache

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Preparar ambiente Android (1ª tentativa, ignora erro)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build1.log
          echo "EXIT CODE: $?"
        continue-on-error: true

      - name: Mostrar log completo (1ª tentativa)
        if: always()
        run: |
          echo "===== ÚLTIMAS 100 LINHAS DO LOG ====="
          tail -n 100 build1.log || true
          echo "===== LINHAS COM ERRO ====="
          grep -n -i -E "error|traceback|failed|exception|not found|not installed|denied" build1.log | tail -n 60 || true

     - name: Aceitar licenças e instalar SDK
  run: |
    SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
    CMDLINE="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"
    yes | "$CMDLINE" --licenses --sdk_root="$SDK_DIR" || true
    yes | "$CMDLINE" --sdk_root="$SDK_DIR" "platform-tools" "build-tools;33.0.2" "platforms;android-33"

      - name: Build do APK (Debug)
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build2.log
        continue-on-error: true

      - name: Mostrar log completo (2ª tentativa)
        if: always()
        run: |
          echo "===== ÚLTIMAS 150 LINHAS DO LOG ====="
          tail -n 150 build2.log || true
          echo "===== LINHAS COM ERRO ====="
          grep -n -i -E "error|traceback|failed|exception|not found|not installed|denied" build2.log | tail -n 60 || true

      - name: Listar arquivos gerados
        if: always()
        run: |
          echo "===== Conteúdo da raiz do projeto ====="
          ls -la
          echo "===== Conteúdo de bin/ (se existir) ====="
          ls -la bin/ || echo "Pasta bin/ não existe"
          echo "===== Procurando .apk em todo o sistema ====="
          find / -iname "*.apk" 2>/dev/null || true

      - name: Upload do APK gerado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gestor-financeiro-apk
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload dos logs completos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build1.log
            build2.log

