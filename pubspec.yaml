name: gestorfinanceiro
description: Gestor Financeiro Mensal com SQLite

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Banco de dados local
  sqflite: ^2.3.2
  path: ^1.9.0

  # Gráficos
  fl_chart: ^0.68.0

  # Formatação de moeda
  intl: ^0.19.0

  # Fontes
  google_fonts: ^6.2.1

  # Compartilhar arquivo .db
  share_plus: ^9.0.0
  file_picker: ^8.0.0+1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
