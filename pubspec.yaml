name: gestor_financeiro
description: Gestor Financeiro Mensal com SQLite + Google Drive

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Banco de dados local
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.3

  # Google Login + Drive
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Gráficos
  fl_chart: ^0.68.0

  # Formatação
  intl: ^0.19.0

  # Fontes
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true